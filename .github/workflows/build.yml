name: Build iOS App for AltStore

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Show Xcode version
      run: xcodebuild -version
      
    - name: List available schemes
      run: xcodebuild -list -project Brainwave.xcodeproj
      
    - name: Show project structure
      run: ls -la
      
    - name: Show Brainwave directory
      run: ls -la Brainwave/
      
    - name: Try to build with full output
      run: |
        set -x
        xcodebuild clean archive \
          -project Brainwave.xcodeproj \
          -scheme Brainwave \
          -archivePath Brainwave.xcarchive \
          -configuration Release \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=NO \
          SKIP_INSTALL=NO 2>&1 | head -200
      
    - name: Check if archive exists
      run: ls -la Brainwave.xcarchive/ 2>&1 || echo "Archive not created"
      
    - name: Create IPA if archive succeeded
      if: success()
      run: |
        mkdir -p Payload
        cp -r Brainwave.xcarchive/Products/Applications/Brainwave.app Payload/
        zip -r Brainwave.ipa Payload/
        mkdir -p Export
        mv Brainwave.ipa Export/
      
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Brainwave-IPA
        path: Export/*.ipa
        if-no-files-found: warn